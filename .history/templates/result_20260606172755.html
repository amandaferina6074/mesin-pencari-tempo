<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Hasil Pencarian</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background-color: #f4f7f6; }
        .container { max-width: 800px; margin: 0 auto; }
        .result-card { background: white; padding: 20px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .result-title { font-size: 18px; color: #0056b3; margin-bottom: 5px; }
        .result-score { font-size: 12px; color: #888; margin-bottom: 10px; }
        .btn-back { display: inline-block; margin-bottom: 20px; text-decoration: none; color: white; background-color: #6c757d; padding: 10px 15px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="btn-back">⬅ Kembali ke Pencarian</a>
        <h3>Hasil pencarian untuk: "<i>{{ query }}</i>"</h3>
        
        {% if results %}
            {% for item in results %}
            <div class="result-card">
                <div class="result-title">{{ item.judul }}</div>
                <div class="result-score">Skor Kemiripan: {{ item.skor }}</div>
                <div>{{ item.isi }}</div>
            </div>
            {% endfor %}
        {% else %}
            <p>Tidak ada berita yang relevan ditemukan.</p>
        {% endif %}
    </div>
</body>
</html>
