<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesin Pencari Berita Tempo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0ede8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .masthead {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .masthead-kicker {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: #8a7f72;
            margin-bottom: .6rem;
        }

        .masthead-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: clamp(2.4rem, 6vw, 3.8rem);
            font-weight: 700;
            color: #1a1714;
            line-height: 1.05;
            letter-spacing: -.02em;
        }

        .masthead-title span { color: #c0392b; }

        .masthead-rule {
            width: 48px;
            height: 2px;
            background: #c0392b;
            margin: 1.2rem auto 0;
        }

        .search-card {
            width: 100%;
            max-width: 620px;
            background: #fff;
            border-radius: 4px;
            padding: 2rem 2rem 2.25rem;
            box-shadow: 0 2px 4px rgba(0,0,0,.06), 0 8px 24px rgba(0,0,0,.08);
        }

        .search-card label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: #8a7f72;
            margin-bottom: .6rem;
        }

        .input-row { display: flex; gap: 10px; }

        .search-input {
            flex: 1;
            padding: 13px 16px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            color: #1a1714;
            background: #faf9f7;
            border: 1px solid #d8d3cc;
            border-radius: 3px;
            outline: none;
            transition: border-color .15s, box-shadow .15s;
        }

        .search-input::placeholder { color: #b0a99f; }

        .search-input:focus {
            border-color: #c0392b;
            box-shadow: 0 0 0 3px rgba(192,57,43,.12);
            background: #fff;
        }

        .btn-cari {
            padding: 13px 22px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: .04em;
            color: #fff;
            background: #c0392b;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            white-space: nowrap;
            transition: background .15s, transform .1s;
        }

        .btn-cari:hover { background: #a93226; }
        .btn-cari:active { transform: scale(.98); }

        .search-hint {
            margin-top: 1rem;
            font-size: 12px;
            color: #a09790;
        }

        .search-hint strong {
            color: #6e6560;
            font-weight: 500;
        }

        .footer {
            margin-top: 2rem;
            font-size: 12px;
            color: #a09790;
            letter-spacing: .03em;
        }

        @media (max-width: 480px) {
            .input-row { flex-direction: column; }
            .btn-cari { width: 100%; }
        }

        @media (prefers-reduced-motion: reduce) {
            * { transition: none !important; }
        }
    </style>
</head>
<body>

    <div class="masthead">
        <p class="masthead-kicker">Mesin Pencari</p>
        <h1 class="masthead-title">Berita <span>Tempo</span></h1>
        <div class="masthead-rule"></div>
    </div>

    <div class="search-card">
        <label for="query">Kata kunci</label>
        <form action="/search" method="POST">
            <div class="input-row">
                <input
                    type="text"
                    id="query"
                    name="query"
                    class="search-input"
                    placeholder="cth. pemilu, ekonomi, teknologi…"
                    autocomplete="off"
                    required
                >
                <button type="submit" class="btn-cari">Cari →</button>
            </div>
        </form>
        <p class="search-hint">Coba: <strong>kebijakan fiskal</strong> · <strong>pilkada 2024</strong> · <strong>startup Indonesia</strong></p>
    </div>

    <p class="footer">© 2025 Tempo Media · Semua hak dilindungi</p>

</body>
</html>
